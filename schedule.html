<!-- 
 =========================================================
  APPALACHIAN FC — 2026 SCHEDULE EMBED
 =========================================================

<div id="appfc-schedule-root">
  <div id="appfc-schedule-content"></div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap');

  #appfc-schedule-root {
    --appfc-black: #0a0a0a;
    --appfc-ink: #1a1a1a;
    --appfc-gold: #f5c518;
    --appfc-gold-deep: #d4a60c;
    --appfc-smoke: #e6e3da;
    --appfc-muted: #6b6b6b;
    --appfc-line: rgba(10, 10, 10, 0.08);

    font-family: 'Barlow', system-ui, sans-serif;
    color: var(--appfc-ink);
    max-width: 920px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    background: #fff;
    box-sizing: border-box;
  }
  #appfc-schedule-root *, #appfc-schedule-root *::before, #appfc-schedule-root *::after {
    box-sizing: border-box;
  }

  .appfc-month-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    color: var(--appfc-gold-deep);
    margin: 1.5rem 0 0.75rem;
    padding-left: 0.5rem;
    border-left: 3px solid var(--appfc-gold);
  }
  .appfc-month-header:first-child { margin-top: 0; }

  .appfc-match-list { display: grid; gap: 0.75rem; }
  .appfc-match {
    background: #fff;
    border: 1px solid var(--appfc-line);
    border-left: 5px solid var(--appfc-gold);
    border-radius: 4px;
    padding: 1.1rem 1.25rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.25rem;
    align-items: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-left-color 0.2s ease;
    position: relative;
  }
  .appfc-match:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px -10px rgba(10, 10, 10, 0.22);
    border-left-color: var(--appfc-black);
  }
  .appfc-match.is-home { border-left-color: var(--appfc-black); }
  .appfc-match.is-home::before {
    content: 'HOME';
    position: absolute;
    top: 0; right: 0;
    background: var(--appfc-black);
    color: var(--appfc-gold);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 3px 8px 3px 10px;
    border-bottom-left-radius: 4px;
  }

  .appfc-date {
    text-align: center;
    min-width: 62px;
    padding-right: 1rem;
    border-right: 1px solid var(--appfc-line);
  }
  .appfc-date-month {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    color: var(--appfc-gold-deep);
    display: block;
    line-height: 1;
  }
  .appfc-date-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--appfc-black);
    display: block;
    line-height: 1;
    margin-top: 0.15rem;
  }
  .appfc-date-dow {
    font-size: 0.65rem;
    color: var(--appfc-muted);
    display: block;
    margin-top: 0.15rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .appfc-info { min-width: 0; }
  .appfc-teams {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .appfc-team {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--appfc-black);
    line-height: 1.2;
  }
  .appfc-crest {
    width: 28px; height: 28px;
    border-radius: 50%;
    background-color: var(--appfc-smoke);
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .appfc-vs {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--appfc-gold-deep);
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    padding: 0 0.1rem;
  }
  .appfc-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1rem;
    margin-top: 0.55rem;
    font-size: 0.82rem;
    color: var(--appfc-muted);
  }
  .appfc-meta a {
    color: var(--appfc-muted);
    text-decoration: none;
    border-bottom: 1px dotted var(--appfc-muted);
    transition: color 0.2s, border-color 0.2s;
  }
  .appfc-meta a:hover {
    color: var(--appfc-gold-deep);
    border-bottom-color: var(--appfc-gold-deep);
  }
  .appfc-meta-item {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .appfc-meta-item svg {
    width: 12px; height: 12px;
    stroke: var(--appfc-gold-deep);
    flex-shrink: 0;
  }
  .appfc-meta a:has(.appfc-watch) {
    color: var(--appfc-gold-deep);
    border-bottom-color: var(--appfc-gold-deep);
    font-weight: 600;
  }
  .appfc-meta a:has(.appfc-watch):hover {
    color: var(--appfc-black);
    border-bottom-color: var(--appfc-black);
  }
  .appfc-watch svg { color: var(--appfc-gold-deep); }

  .appfc-time {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    color: var(--appfc-black);
    white-space: nowrap;
    line-height: 1;
  }
  .appfc-time-label {
    display: block;
    font-family: 'Barlow', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--appfc-muted);
    margin-bottom: 0.3rem;
  }

  @media (max-width: 620px) {
    .appfc-match {
      grid-template-columns: auto 1fr;
      gap: 0.85rem;
      padding: 1rem;
    }
    .appfc-time {
      grid-column: 1 / -1;
      text-align: left;
      padding-top: 0.6rem;
      border-top: 1px dashed var(--appfc-line);
      font-size: 1.05rem;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }
    .appfc-time-label { display: inline; margin: 0; }
    .appfc-date { min-width: 52px; padding-right: 0.75rem; }
    .appfc-date-day { font-size: 1.8rem; }
    .appfc-team { font-size: 0.95rem; gap: 0.4rem; }
    .appfc-crest { width: 22px; height: 22px; }
  }

  .appfc-match { animation: appfc-fade 0.4s ease both; }
  @keyframes appfc-fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatTime(d) {
    var h = d.getHours(), m = d.getMinutes();
    var ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ap;

  function renderTeam(team) {

  function render() {

      if (monthKey !== currentMonthKey) {
        if (currentMonthKey !== '') html += '</div>';
        currentMonthKey = monthKey;
        html += '<h3 class="appfc-month-header">' +
                  MONTHS_LONG[m.date.getMonth()] + ' ' + m.date.getFullYear() +
                '</h3>';
        html += '<div class="appfc-match-list">';
      }

      var dy = m.date.getDate();
      var dow = DAYS[m.date.getDay()];

      var locInner = '<span class="appfc-meta-item">' + ICON_PIN + escapeHtml(m.location) + '</span>';
      var metaHtml = m.mapsUrl
        ? '<a href="' + escapeHtml(m.mapsUrl) + '" target="_blank" rel="noopener">' + locInner + '</a>'
        : locInner;

      var streamPath = STREAM_PATHS[m.id];
      if (streamPath) {
        var streamUrl = SE_BASE_URL + streamPath;
        metaHtml +=
          '<a href="' + escapeHtml(streamUrl) + '" target="_blank" rel="noopener">' +
            '<span class="appfc-meta-item appfc-watch">' + ICON_PLAY + 'Watch on SportsEngine</span>' +
          '</a>';
      }

      html +=

            '<span class="appfc-date-month">' + mo + '</span>' +

            '<span class="appfc-date-dow">' + dow + '</span>' +
          '</div>' +
          '<div class="appfc-info">' +
            '<div class="appfc-teams">' +

              '<span class="appfc-vs">VS</span>' +
              renderTeam(m.away) +
            '</div>' +
            '<div class="appfc-meta">' + metaHtml + '</div>' +
          '</div>' +
          '<div class="appfc-time">' +
            '<span class="appfc-time-label">Kickoff</span>' + formatTime(m.date) +
          '</div>' +
        '</div>';
    });
    if (currentMonthKey !== '') html += '</div>';

    container.innerHTML = html;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
