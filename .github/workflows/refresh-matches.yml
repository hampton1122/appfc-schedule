name: Refresh matches.json

on:
  schedule:
    # Every 30 minutes. Cron is in UTC.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-matches
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate matches.json
        run: ./generate_matches_json.sh --update

      - name: Commit if changed
        run: |
          if git diff --quiet matches.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git commit -m "chore: refresh matches.json"
          git push
